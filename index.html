<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>평행우주 투두</title>
    <meta
      name="description"
      content="하루를 하나로 계획하지 않고, 컨디션에 따라 A/B/C 세 가지 버전으로 준비하는 평행우주 투두앱"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero card">
        <div>
          <p class="eyebrow">Parallel Universe Todo</p>
          <h1>오늘은 어느 우주에서 살까요?</h1>
          <p class="hero-copy">
            하루를 하나로 계획하지 말고, 컨디션에 맞는 A/B/C 세 가지 버전으로 준비하세요.
          </p>
        </div>
        <div class="hero-stats">
          <div>
            <span class="hero-stat-label">오늘 선택한 우주</span>
            <strong id="currentUniverseLabel">A</strong>
          </div>
          <div>
            <span class="hero-stat-label">오늘 완료율</span>
            <strong id="completionRate">0%</strong>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="left-column">
          <div class="card date-card">
            <div class="section-header">
              <div>
                <p class="section-label">Date</p>
                <h2>날짜 선택</h2>
              </div>
            </div>
            <div class="date-controls">
              <button id="prevDateBtn" class="ghost-btn" type="button">← 이전</button>
              <button id="todayBtn" class="primary-btn" type="button">오늘</button>
              <button id="nextDateBtn" class="ghost-btn" type="button">다음 →</button>
            </div>
            <label class="sr-only" for="dateInput">날짜 선택</label>
            <input id="dateInput" class="date-input" type="date" />
            <p id="dateDisplay" class="date-display"></p>
          </div>

          <div class="card summary-card">
            <div class="section-header">
              <div>
                <p class="section-label">Kick</p>
                <h2>평행우주 선택</h2>
              </div>
              <span class="badge">A / B / C</span>
            </div>
            <div id="universeSummary" class="universe-summary"></div>
          </div>
        </section>

        <section class="right-column">
          <div class="card focus-card">
            <div class="focus-top">
              <div>
                <p class="section-label">Active Universe</p>
                <h2 id="activeUniverseTitle">Focus Universe</h2>
                <p id="activeUniverseDescription" class="muted"></p>
              </div>
              <div class="tabs" role="tablist" aria-label="우주 선택">
                <button class="tab-btn" data-universe="A" type="button">A</button>
                <button class="tab-btn" data-universe="B" type="button">B</button>
                <button class="tab-btn" data-universe="C" type="button">C</button>
              </div>
            </div>
            <div class="progress-wrap">
              <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
              </div>
              <span id="progressText" class="progress-text">0 / 0 완료</span>
            </div>
          </div>

          <div class="card input-card">
            <div class="section-header">
              <div>
                <p class="section-label">Todo</p>
                <h2>할 일 추가</h2>
              </div>
            </div>
            <form id="todoForm" class="todo-form">
              <input
                id="todoInput"
                type="text"
                placeholder="예: 포트폴리오 메인 섹션 초안 완성"
                maxlength="120"
                required
              />
              <button class="primary-btn" type="submit">추가</button>
            </form>
          </div>

          <div class="card list-card">
            <div class="section-header">
              <div>
                <p class="section-label">Tasks</p>
                <h2>현재 우주의 할 일</h2>
              </div>
              <span id="taskCountBadge" class="badge">0개</span>
            </div>
            <div id="emptyState" class="empty-state hidden">
              <div class="empty-icon">🪐</div>
              <h3>이 우주는 아직 비어 있어요</h3>
              <p>지금 상태에 맞는 할 일을 하나 추가해 보세요.</p>
            </div>
            <ul id="todoList" class="todo-list"></ul>
          </div>
        </section>
      </main>
    </div>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <label class="todo-check">
          <input type="checkbox" />
          <span class="checkmark"></span>
        </label>
        <div class="todo-content">
          <p class="todo-text"></p>
          <div class="todo-meta">
            <span class="todo-created-at"></span>
          </div>
        </div>
        <div class="todo-actions">
          <button class="ghost-btn small edit-btn" type="button">수정</button>
          <button class="danger-btn small delete-btn" type="button">삭제</button>
        </div>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
